{% extends "base.html" %}

{% block title %}Create Rider - Manager Dashboard - CHR{% endblock %}

{% block content %}
<div class="row align-items-center mb-4">
    <div class="col-md-6">
        <h1 class="h3 mb-0 text-gray-800">
            <i class="bi bi-person-plus text-primary me-2"></i>Create New Rider
        </h1>
    </div>
    <div class="col-md-6 text-md-end mt-3 mt-md-0">
        <a href="{{ url_for('manager.riders') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back to Riders
        </a>
    </div>
</div>

<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card shadow-sm mb-4 border-0">
            <div class="card-header bg-white py-3">
                <h6 class="m-0 font-weight-bold text-primary">Rider Information</h6>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('manager.create_rider') }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="full_name" class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="full_name" name="full_name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="phone_number" class="form-label">Phone Number <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="phone_number" name="phone_number" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email Address (Optional)</label>
                            <input type="email" class="form-control" id="email" name="email">
                            <div class="form-text">Used for password resets and communications.</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Initial Password <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <div class="form-text">They will use this to sign in.</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="address" class="form-label">Full Address <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="address" name="address" rows="3" required></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-person-plus-fill me-1"></i>Create Rider Account
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
